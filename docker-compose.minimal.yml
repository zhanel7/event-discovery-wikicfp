# Только API + PostgreSQL (без Prometheus/Grafana).
# Запуск: docker-compose -f docker-compose.minimal.yml up --build

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build: .
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/eventdb
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/eventdb
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: "false"
      ENVIRONMENT: production
    env_file:
      - .env

volumes:
  postgres_data:
